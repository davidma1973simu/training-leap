<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Training Leap - 培训课后行动计划与跟进</title>
<style>
:root{
  --ink:#0f172a;
  --sub:#334155;
  --muted:#64748b;
  --light:#94a3b8;
  --border:#e2e8f0;
  --card:#ffffff;
  --bg:#f8fafc;
  --accent:#0d9488;
  --accent-light:#14b8a6;
  --accent-bg:#e0f7f4;
  --amber:#d97706;
  --amber-bg:#fef3c7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}

/* Hero */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-200px;left:-200px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(13,148,136,.08) 0%,transparent 70%)}
.hero::after{content:"";position:absolute;bottom:-150px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(217,119,6,.06) 0%,transparent 70%)}

.logo-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.logo-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.brand{font-size:28px;font-weight:800;color:var(--ink);letter-spacing:-.5px}
.tagline{font-size:15px;color:var(--muted);margin-bottom:40px;letter-spacing:.3px}

.desc{text-align:left;max-width:580px;margin:0 auto 44px;font-size:15px;color:var(--sub);line-height:1.8}
.desc p{margin-bottom:10px}

/* Entry cards */
.entries{display:flex;gap:20px;max-width:580px;width:100%;margin:0 auto;flex-direction:row}
.entry-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;cursor:pointer;text-decoration:none;transition:all .25s ease;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;text-align:center}
.entry-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(15,23,42,.1);border-color:transparent}
.entry-card .entry-bar{position:absolute;top:0;left:0;right:0;height:4px}
.entry-card.student .entry-bar{background:linear-gradient(90deg,var(--accent),#6ee7b7)}
.entry-card.admin .entry-bar{background:linear-gradient(90deg,var(--amber),#fbbf24)}

.entry-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.entry-card.student .entry-icon{background:var(--accent-bg)}
.entry-card.admin .entry-icon{background:var(--amber-bg)}
.entry-icon svg{width:26px;height:26px;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;fill:none}
.student .entry-icon svg{stroke:var(--accent)}
.admin .entry-icon svg{stroke:var(--amber)}

.entry-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:6px}
.entry-desc{font-size:13px;color:var(--muted);line-height:1.5}
.entry-arrow{margin-top:18px;font-size:20px;color:var(--light);transition:all .2s}
.entry-card:hover .entry-arrow{color:var(--accent);transform:translateX(4px)}

/* Footer info */
.footer-info{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);text-align:center}
.footer-info span{font-size:11px;color:var(--light);letter-spacing:.5px}

/* Responsive */
@media(max-width:600px){
  .entries{flex-direction:column}
  .hero{padding:40px 20px}
  .brand{font-size:24px}
  .desc{font-size:14px}
}
</style>
</head>
<body>

<div class="hero">

  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <div class="brand">Training Leap</div>
  </div>

  <div class="tagline">培训课后行动计划与跟进</div>

  <div class="desc">
    <p>将培训所学转化为可执行、可追踪的行动计划。</p>
    <p>学员端：创建你的课后行动计划，导出交付物。</p>
    <p>后台管理：配置培训项目，追踪学员进度。</p>
  </div>

  <div class="entries">
    <a href="student.html" class="entry-card student">
      <div class="entry-bar"></div>
      <div class="entry-icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="entry-title">学员端</div>
      <div class="entry-desc">登录后创建和管理<br>你的行动计划</div>
      <div class="entry-arrow">&rarr;</div>
    </a>

    <a href="admin.html" class="entry-card admin">
      <div class="entry-bar"></div>
      <div class="entry-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="entry-title">后台管理</div>
      <div class="entry-desc">配置培训项目<br>查看学员进度</div>
      <div class="entry-arrow">&rarr;</div>
    </a>
  </div>

  <div class="footer-info">
    <span>TRAINING LEAP &copy; 2026</span>
  </div>

</div>

</body>
</html>
